<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <title>Monthly Report</title>
  </head>
  <body class="h-full bg-slate-100 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
    <div class="min-h-screen">
      <header class="sticky top-0 z-20 border-b border-white/10 bg-white/80 px-4 py-4 backdrop-blur dark:bg-slate-950/80">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div class="flex items-center justify-between gap-3 sm:justify-start">
            <div>
              <h1 class="text-xl font-semibold">Monthly Report</h1>
              <p class="text-sm text-slate-500 dark:text-slate-400">Year and month filtered view</p>
            </div>
          </div>
          <button id="themeBtn" class="rounded-xl border border-slate-200 px-3 py-2 text-sm dark:border-slate-700">Toggle Theme</button>
        </div>
      </header>

      <main class="space-y-8 p-4 pb-24 lg:p-6 lg:pb-6">
        <section class="card grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
          <div><div class="metric-label">Monthly Income</div><div class="metric-value positive">৳0</div></div>
          <div><div class="metric-label">Monthly Expense</div><div class="metric-value negative">৳0</div></div>
          <div><div class="metric-label">Net Balance</div><div class="metric-value">৳0</div></div>
          <div><div class="metric-label">Profit %</div><div class="metric-value">0%</div></div>
        </section>

        <section class="card">
          <div class="section-title">Filters</div>
          <div class="grid gap-4 sm:grid-cols-2">
            <input class="rounded-xl border border-slate-200 bg-transparent px-4 py-3 dark:border-slate-800" value="2026" />
            <input class="rounded-xl border border-slate-200 bg-transparent px-4 py-3 dark:border-slate-800" value="June" />
          </div>
        </section>

        <section class="card overflow-x-auto">
          <div class="section-title">Daily Breakdown</div>
          <table class="min-w-full text-sm">
            <thead><tr class="text-left text-slate-500 dark:text-slate-400"><th class="py-3 pr-4">Date</th><th class="py-3 pr-4">Income</th><th class="py-3 pr-4">Expense</th><th class="py-3 pr-4">Net</th><th class="py-3 pr-4">Notes</th></tr></thead>
            <tbody></tbody>
          </table>
        </section>

        <section class="grid gap-4 xl:grid-cols-2">
          <div class="card"><div class="section-title">Income vs Expense</div><canvas></canvas></div>
          <div class="card"><div class="section-title">Member Contribution</div><canvas></canvas></div>
        </section>
      </main>
    </div>

    <nav class="bottom-nav fixed inset-x-0 bottom-0 z-40 border-t border-slate-200 bg-white/95 px-2 py-2 backdrop-blur dark:border-slate-800 dark:bg-slate-950/95">
      <div class="grid grid-cols-5 gap-1 text-xs font-medium">
        <a href="index.html" class="bottom-nav-item">Home</a>
        <a href="monthly-report.html" class="bottom-nav-item active">Report</a>
        <a href="members.html" class="bottom-nav-item">Members</a>
        <a href="entry.html" class="bottom-nav-item">Entry</a>
        <a href="settings.html" class="bottom-nav-item">Settings</a>
      </div>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
