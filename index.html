<title>FIC Staff Portal</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Anek+Bangla:wght@400;500;600&display=swap">

<style>
/* ═══ THEME TOKENS ═══ */
:root {
  --bg0:#f8fafc; --bg1:#ffffff; --bg2:#f1f5f9; --bg3:#e2e8f0;
  --bdr:#e2e8f0;
  --t1:#0f172a; --t2:#475569; --t3:#64748b; --t4:#94a3b8;
  --acc:#2563eb; --acc-bg:#eff6ff; --acc-txt:#1d4ed8; --acc-bdr:#bfdbfe;
  --ok-bg:#dcfce7; --ok-txt:#15803d;
  --warn-bg:#fef3c7; --warn-txt:#b45309;
  --danger-bg:#fef2f2; --danger-txt:#dc2626;
  --purple:#7c3aed; --amber:#f59e0b;
  --teal:#0d9488;
  --phone-ring:#0f172a;
  --nav-bg:#ffffff;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
[data-theme="dark"] {
  --bg0:#0f172a; --bg1:#1e293b; --bg2:#263348; --bg3:#334155;
  --bdr:#334155;
  --t1:#f1f5f9; --t2:#cbd5e1; --t3:#94a3b8; --t4:#475569;
  --acc:#3b82f6; --acc-bg:#172554; --acc-txt:#93c5fd; --acc-bdr:#1e40af;
  --ok-bg:#052e16; --ok-txt:#4ade80;
  --warn-bg:#431407; --warn-txt:#fbbf24;
  --danger-bg:#3b0000; --danger-txt:#f87171;
  --purple:#a78bfa; --amber:#fbbf24;
  --teal:#2dd4bf;
  --phone-ring:#334155;
  --nav-bg:#1e293b;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#cbd5e1;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:2rem 1rem;transition:background .3s;}
body[data-theme="dark"]{background:#020617;}
/* ═══ PHONE FRAME ═══ */
#fw{position:relative;width:390px;max-width:100%;height:800px;background:var(--bg0);border-radius:40px;border:9px solid var(--phone-ring);overflow:hidden;display:flex;flex-direction:column;transition:background .25s,border-color .25s;}
.bn{font-family:'Anek Bangla',sans-serif;}
/* ═══ STATUS BAR ═══ */
.statusBar{display:flex;justify-content:space-between;align-items:center;padding:10px 22px 2px;font-size:13px;font-weight:600;color:var(--t1);flex-shrink:0;background:var(--bg1);transition:background .25s,color .25s;}
/* ═══ HEADER ═══ */
.appHeader{padding:8px 16px 10px;background:var(--bg1);border-bottom:1px solid var(--bdr);flex-shrink:0;transition:background .25s,border-color .25s;}
.appHeader .hTop{display:flex;justify-content:space-between;align-items:center;}
.appHeader .hTitle{font-size:16px;font-weight:700;color:var(--t1);}
.appHeader .hSub{font-size:11px;color:var(--t3);margin-top:1px;}
/* ═══ ROLE PILL ═══ */
.rolePill{display:flex;background:var(--bg3);border-radius:999px;padding:3px;gap:2px;transition:background .25s;}
.roleBtn{border:none;background:none;font-size:11px;font-weight:600;padding:5px 11px;border-radius:999px;color:var(--t3);cursor:pointer;font-family:inherit;transition:background .15s,color .15s;}
.roleBtn.on{background:var(--acc);color:#fff;}
/* ═══ SCROLL ═══ */
#scScroll{flex:1;overflow-y:auto;overscroll-behavior:contain;}
#scScroll::-webkit-scrollbar{width:3px;}
#scScroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}
/* ═══ NAV ═══ */
#bottomNav{flex-shrink:0;display:flex;border-top:1px solid var(--bdr);background:var(--nav-bg);transition:background .25s,border-color .25s;}
.navBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 10px;background:none;border:none;color:var(--t4);font-size:10px;font-family:inherit;cursor:pointer;transition:color .15s;}
.navBtn.on{color:var(--acc);}
/* ═══ CHIPS ═══ */
.chip{font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid var(--bdr);background:var(--bg1);color:var(--t2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s,color .15s,border-color .15s;}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff;}
/* ═══ SEG TABS ═══ */
.segBtn{flex:1;text-align:center;padding:8px 0;font-size:12px;font-weight:600;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:color .15s,border-color .15s;}
.segBtn.on{color:var(--acc);border-bottom-color:var(--acc);}
/* ═══ INPUTS ═══ */
#fw input,#fw select{font-size:13px;padding:7px 9px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg1);color:var(--t1);font-family:inherit;width:100%;transition:background .2s,color .2s,border-color .2s;}
#fw input:focus,#fw select:focus{outline:none;border-color:var(--acc);}
#fw label.fl{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:3px;display:block;}
/* ═══ MEMBER CARD ═══ */
.mCard{display:block;width:100%;text-align:left;background:var(--bg1);border:1px solid var(--bdr);border-radius:12px;padding:10px 12px;cursor:pointer;font-family:inherit;margin-bottom:7px;transition:background .15s,border-color .15s;}
.mCard:active{background:var(--bg2);}
/* ═══ AVATAR ═══ */
.avatar{width:36px;height:36px;border-radius:50%;background:var(--acc-bg);color:var(--acc-txt);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
/* ═══ PILL BADGES ═══ */
.pillPaid{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--ok-bg);color:var(--ok-txt);font-weight:600;white-space:nowrap;}
.pillDue{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--warn-bg);color:var(--warn-txt);font-weight:600;white-space:nowrap;}
/* ═══ ICON BTNS ═══ */
.iconBtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:var(--bg2);border:none;border-radius:12px;padding:8px 0;color:var(--acc);font-size:10px;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .15s;}
/* ═══ CARD ═══ */
.card{background:var(--bg1);border:1px solid var(--bdr);border-radius:12px;padding:12px;transition:background .25s,border-color .25s;}
/* ═══ PROGRESS BAR ═══ */
.progTrack{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:2px;}
.progFill{height:100%;border-radius:2px;transition:width .3s;}
/* ═══ BATCH ═══ */
.bRow{display:flex;align-items:center;gap:5px;padding:5px 0;border-bottom:1px solid var(--bg2);}
.bRow:last-child{border-bottom:none;}
.bRow.has-amt{background:linear-gradient(90deg,var(--ok-bg) 0,transparent 8px);}
.bRow.unchecked{opacity:.4;}
.bRow.unchecked .amtInput,.bRow.unchecked .rcvBtn,.bRow.unchecked .mthSel{pointer-events:none;}
.rowChk{width:16px;height:16px;accent-color:var(--acc);cursor:pointer;flex-shrink:0;}
.rcvToggle{display:flex;border:1px solid var(--bdr);border-radius:6px;overflow:hidden;flex-shrink:0;}
.rcvToggle.ov .rcvBtn.on{background:var(--purple);}
.rcvBtn{border:none;background:var(--bg2);color:var(--t3);font-size:10px;font-weight:600;padding:3px 5px;cursor:pointer;font-family:'Anek Bangla',sans-serif;line-height:1.3;transition:background .12s,color .12s;}
.rcvBtn.on{background:var(--acc);color:#fff;}
.rcvBtn:first-child{border-right:1px solid var(--bdr);}
.mthSel{width:60px!important;font-size:10px!important;padding:3px 2px 3px 4px!important;border-radius:6px!important;color:var(--t1)!important;appearance:auto;height:28px;flex-shrink:0;}
.mthSel.ov{border-color:var(--amber)!important;background:var(--warn-bg)!important;}
.amtInput{width:58px!important;text-align:right;padding:4px!important;font-size:11px!important;border:1px solid var(--bdr);border-radius:7px;background:var(--bg1);color:var(--t1);font-family:inherit;flex-shrink:0;}
/* ═══ MODE BTNS ═══ */
.modeBtn{flex:1;text-align:center;padding:8px 0;font-size:12px;font-weight:600;color:var(--t3);background:var(--bg2);border:none;cursor:pointer;font-family:inherit;transition:background .15s,color .15s;}
.modeBtn.on{background:var(--acc);color:#fff;}
.modeBtn:first-child{border-radius:8px 0 0 8px;}
.modeBtn:last-child{border-radius:0 8px 8px 0;}
/* ═══ SETTINGS ═══ */
.settingSection{background:var(--bg1);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:14px;transition:background .25s,border-color .25s;}
.sectionHead{font-size:10px;font-weight:700;color:var(--t4);padding:10px 14px 4px;letter-spacing:.8px;text-transform:uppercase;}
.settingRow{display:flex;align-items:center;padding:12px 14px;border-top:1px solid var(--bg2);gap:10px;}
.settingRow:first-of-type{border-top:none;}
.sLabel{font-size:13px;font-weight:500;color:var(--t1);flex:1;}
.sSub{font-size:11px;color:var(--t3);}
.themeGroup,.langGroup{display:flex;gap:8px;padding:8px 14px 14px;}
.themeBtn,.langBtn{flex:1;border:1.5px solid var(--bdr);background:var(--bg2);border-radius:10px;padding:9px 4px;font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;transition:border-color .15s,color .15s,background .15s;}
.themeBtn.on,.langBtn.on{border-color:var(--acc);color:var(--acc);background:var(--acc-bg);}
/* ═══ DRAWER ═══ */
#shOv{position:absolute;inset:0;background:rgba(15,23,42,.5);opacity:0;pointer-events:none;transition:opacity .25s;z-index:5;}
#shDrw{position:absolute;left:0;right:0;bottom:0;height:86%;background:var(--bg1);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);overflow-y:auto;z-index:6;padding:8px 16px 20px;transition:transform .3s cubic-bezier(.16,1,.3,1),background .25s;}
.drawerHandle{width:32px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 10px;}
/* ═══ TOAST ═══ */
#ficToast{position:absolute;left:50%;bottom:76px;transform:translateX(-50%);background:var(--t1);color:var(--bg1);font-size:12px;padding:7px 16px;border-radius:999px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:7;}
/* ═══ ABOUT CARD ═══ */
.aboutCard{background:linear-gradient(135deg,var(--acc) 0%,#1d4ed8 100%);border-radius:14px;padding:16px;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.aboutLogo{width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;}
/* ═══ STAT MINI ═══ */
.statMini{background:var(--bg2);border-radius:9px;padding:9px 10px;}
.statMini p:first-child{font-size:10px;color:var(--t3);}
.statMini p:last-child{font-size:13px;font-weight:600;color:var(--t1);margin-top:1px;}
</style>
</head>

  </div>

</div>

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function t(k){return TR[appState.lang][k]||k;}
function ini(s){return (s||'').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?';}
function getDefRcv(){var b=document.querySelector('.byBChip.on');return b?b.getAttribute('data-v'):(t('rcv1'));}
function getDefMth(){var s=document.getElementById('bDefMeth');return s?s.value:(t('methods')[0]);}
function getDefAmt(){var v=document.getElementById('bDefAmt');return v?(parseInt(v.value)||300):300;}

function showToast(msg){
  var el=document.getElementById('ficToast');
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(window._ft);
  window._ft=setTimeout(function(){el.style.opacity='0';},2200);
}

/* ═══════════════════════════════════════
   THEME
═══════════════════════════════════════ */
function applyTheme(mode){
  var fw=document.getElementById('fw');
  var html=document.documentElement;
  var body=document.body;
  var resolved=mode;
  if(mode==='system'){
    resolved=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  }
  [fw,html,body].forEach(function(el){el.setAttribute('data-theme',resolved);});
}

function setTheme(mode){
  appState.theme=mode;
  applyTheme(mode);
  // Update buttons
  document.querySelectorAll('.themeBtn').forEach(function(b){
    b.classList.toggle('on',b.getAttribute('data-th')===mode);
  });
}

/* watch system pref changes */
if(window.matchMedia){
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){
    if(appState.theme==='system') applyTheme('system');
  });
}

/* ═══════════════════════════════════════
   LANGUAGE
═══════════════════════════════════════ */
function applyLang(){
  var l=appState.lang;
  document.documentElement.lang=l;
  document.getElementById('appTitle').textContent=t('appTitle');
  document.getElementById('appSub').textContent=t('appSub');
  document.getElementById('navHomeLbl').textContent=t('navMembers');
  document.getElementById('navDashLbl').textContent=t('navDash');
  document.getElementById('navEntryLbl').textContent=t('navEntry');
  document.getElementById('navSettingsLbl').textContent=t('navSettings');
  document.getElementById('srch').placeholder=t('srch');
  document.getElementById('chipAll').textContent=t('filterAll');
  document.getElementById('chipPaid').textContent=t('filterPaid');
  document.getElementById('chipDue').textContent=t('filterDue');
  // Re-render active screen
  renderScreen(appState.screen);
  renderList();
}

/* ═══════════════════════════════════════
   SCREEN ROUTER
═══════════════════════════════════════ */
function showScreen(s){
  appState.screen=s;
  ['home','dash','entry','settings'].forEach(function(id){
    document.getElementById('sc'+id.charAt(0).toUpperCase()+id.slice(1)).style.display='none';
  });
  var scMap={home:'scHome',dash:'scDash',entry:'scEntry',settings:'scSettings'};
  var el=document.getElementById(scMap[s]);
  if(el) el.style.display='block';
  document.querySelectorAll('.navBtn').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-screen')===s);});
  document.getElementById('scScroll').scrollTop=0;
  renderScreen(s);
}

function renderScreen(s){
  if(s==='dash') renderDash();
  if(s==='entry') renderEntry();
  if(s==='settings') renderSettings();
}

/* ═══════════════════════════════════════
   MEMBER LIST
═══════════════════════════════════════ */
function renderList(){
  var q=document.getElementById('srch').value.trim();
  var sFilter=document.querySelector('.stChip.on').getAttribute('data-s');
  var fl=members.filter(function(m){
    var nm=appState.lang==='en'?m.en:m.n;
    var match=!q||(nm.toLowerCase().indexOf(q.toLowerCase())>-1||m.c.toLowerCase().indexOf(q.toLowerCase())>-1||m.ph.indexOf(q)>-1||m.n.indexOf(q)>-1);
    var paid=m.jun26>0;
    var ms=sFilter==='all'||(sFilter==='paid'&&paid)||(sFilter==='due'&&!paid);
    return match&&ms;
  });
  document.getElementById('rCnt').textContent=t('showing')+' '+fl.length+' '+t('of')+' 48';
  var el=document.getElementById('mList'); el.innerHTML='';
  fl.forEach(function(m){
    var paid=m.jun26>0;
    var nm=appState.lang==='en'?m.en:m.n;
    var rl=appState.lang==='en'?m.roleEn:m.role;
    var pill=paid?'<span class="pillPaid">৳'+m.jun26+' '+t('paidBadge')+'</span>':'<span class="pillDue">'+t('dueBadge')+'</span>';
    var btn=document.createElement('button');
    btn.className='mCard';
    btn.setAttribute('data-c',m.c);
    btn.innerHTML='<div style="display:flex;gap:9px;align-items:flex-start;">'+
      '<div class="avatar bn">'+ini(m.n)+'</div>'+
      '<div style="flex:1;min-width:0;">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;">'+
          '<p class="bn" style="margin:0;font-size:13px;font-weight:600;color:var(--t1);">'+m.n+(appState.lang==='en'&&nm!==m.n?' <span style="color:var(--t3);font-size:11px;">('+nm+')</span>':'')+'</p>'+pill+
        '</div>'+
        '<p style="margin:1px 0 2px;font-size:10px;color:var(--t4);">'+m.c+' · '+m.addr+' · '+rl+'</p>'+
        '<p style="margin:0;font-size:11px;color:var(--acc);">'+m.ph+'</p>'+
      '</div></div>';
    btn.addEventListener('click',function(){openSheet(m.c);});
    el.appendChild(btn);
  });
}

function wireBatch(){
  var container=document.getElementById('pBatch');
  if(!container) return;

  initBatch();
  renderBatchList();

  /* apply all */
  var applyBtn=document.getElementById('applyAllBtn');
  if(applyBtn) applyBtn.addEventListener('click',function(){
    var dr=getDefRcv(), dm=getDefMth();
    batchState.forEach(function(s){s.rcv=dr;s.mth=dm;s.rcvOv=false;s.mthOv=false;});
    renderBatchList();
    showToast(t('appliedAll'));
  });

  /* default receiver chips */
  document.querySelectorAll('.byBChip').forEach(function(ch){
    ch.addEventListener('click',function(){
      document.querySelectorAll('.byBChip').forEach(function(x){x.classList.remove('on');});
      ch.classList.add('on');
      var dr=ch.getAttribute('data-v');
      batchState.forEach(function(s){if(!s.rcvOv){s.rcv=dr;}});
      document.querySelectorAll('#batchList .bRow').forEach(function(row){
        var idx=parseInt(row.getAttribute('data-idx'));
        var s=batchState[idx];
        row.querySelectorAll('.rcvBtn').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-v')===s.rcv);});
        row.querySelector('.rcvToggle').classList.toggle('ov',s.rcvOv);
      });
      updateBatchFooter();
    });
  });

  /* default method select */
  var bDefMeth=document.getElementById('bDefMeth');
  if(bDefMeth) bDefMeth.addEventListener('change',function(){
    var dm=this.value;
    batchState.forEach(function(s){if(!s.mthOv){s.mth=dm;}});
    document.querySelectorAll('#batchList .mthSel').forEach(function(sel){
      var idx=parseInt(sel.getAttribute('data-idx'));
      sel.value=batchState[idx].mth;
      sel.classList.toggle('ov',batchState[idx].mthOv);
    });
    updateBatchFooter();
  });

  /* check all */
  var chkAll=document.getElementById('chkAll');
  if(chkAll) chkAll.addEventListener('change',function(){
    var checked=this.checked;
    batchState.forEach(function(s){s.sel=checked;});
    document.querySelectorAll('#batchList .rowChk').forEach(function(c){c.checked=checked;});
    document.querySelectorAll('#batchList .bRow').forEach(function(r){r.classList.toggle('unchecked',!checked);});
    updateBatchFooter();
  });

  /* submit */
  var bSubmit=document.getElementById('bSubmit');
  if(bSubmit) bSubmit.addEventListener('click',function(){
    var cnt=batchState.filter(function(s){return s.amt>0&&s.sel;}).length;
    if(cnt===0){showToast(t('noAmt'));return;}
    showToast(cnt+t('batchSaved'));
  });
}

function renderBatchList(){
  var bl=document.getElementById('batchList');
  if(!bl) return;
  bl.innerHTML='';
  var ms=t('methods');
  var selCnt=0;
  members.forEach(function(m,i){
    var s=batchState[i];
    if(s.sel) selCnt++;
    var row=document.createElement('div');
    row.className='bRow'+(s.amt>0&&s.sel?' has-amt':'')+(s.sel?'':' unchecked');
    row.setAttribute('data-idx',i);

    row.innerHTML=
      '<input type="checkbox" class="rowChk" data-idx="'+i+'" '+(s.sel?'checked':'')+' style="flex-shrink:0;">'+
      '<div style="flex:1;min-width:0;overflow:hidden;">'+
        '<p class="bn" style="margin:0;font-size:11px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+m.n+'</p>'+
        '<p style="margin:0;font-size:9px;color:'+(m.jun26>0?'var(--ok-txt)':'var(--t4)')+';">'+(m.jun26>0?'✓ paid':'বাকি')+'</p>'+
      '</div>'+
      '<div class="rcvToggle'+(s.rcvOv?' ov':'')+'" style="flex-shrink:0;">'+
        '<button class="rcvBtn'+(s.rcv===t('rcv1')?' on':'')+'" data-idx="'+i+'" data-v="'+t('rcv1')+'" title="'+t('rcv1')+'">'+t('rcv1Short')+'</button>'+
        '<button class="rcvBtn'+(s.rcv===t('rcv2')?' on':'')+'" data-idx="'+i+'" data-v="'+t('rcv2')+'" title="'+t('rcv2')+'">'+t('rcv2Short')+'</button>'+
      '</div>'+
      '<select class="mthSel'+(s.mthOv?' ov':'')+'" data-idx="'+i+'" style="width:58px!important;"></select>'+
      '<input class="amtInput" type="number" placeholder="—" data-idx="'+i+'" min="0" step="100" value="'+(s.amt>0?s.amt:'')+'" style="width:58px!important;">';

    /* populate method select */
    var sel=row.querySelector('.mthSel');
    ms.forEach(function(mth){
      var o=document.createElement('option');
      o.value=mth; o.textContent=mth;
      if(mth===s.mth) o.selected=true;
      sel.appendChild(o);
    });

    /* row checkbox */
    row.querySelector('.rowChk').addEventListener('change',function(e){
      batchState[i].sel=e.target.checked;
      row.classList.toggle('unchecked',!e.target.checked);
      updateBatchFooter();
      var allChecked=batchState.every(function(x){return x.sel;});
      var chkAll=document.getElementById('chkAll');
      if(chkAll) chkAll.checked=allChecked;
    });

    /* receiver toggle */
    row.querySelectorAll('.rcvBtn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var defRcv=getDefRcv();
        batchState[i].rcv=btn.getAttribute('data-v');
        batchState[i].rcvOv=(batchState[i].rcv!==defRcv);
        row.querySelectorAll('.rcvBtn').forEach(function(b){b.classList.toggle('on',b===btn);});
        row.querySelector('.rcvToggle').classList.toggle('ov',batchState[i].rcvOv);
        updateBatchFooter();
      });
    });

    /* method select */
    sel.addEventListener('change',function(){
      batchState[i].mth=sel.value;
      batchState[i].mthOv=(sel.value!==getDefMth());
      sel.classList.toggle('ov',batchState[i].mthOv);
      updateBatchFooter();
    });

    /* amount input */
    var amtInp=row.querySelector('.amtInput');
    amtInp.addEventListener('input',function(){
      batchState[i].amt=parseInt(amtInp.value)||0;
      row.classList.toggle('has-amt',batchState[i].amt>0&&batchState[i].sel);
      updateBatchFooter();
    });

    bl.appendChild(row);
  });

  var sc=document.getElementById('selCount');
  if(sc) sc.textContent='('+selCnt+')';
  updateBatchFooter();
}

function updateBatchFooter(){
  var total=0, count=0, rcv1t=0, rcv2t=0;
  var methMap={};
  batchState.forEach(function(s){
    if(s.amt>0&&s.sel){
      total+=s.amt; count++;
      if(s.rcv===t('rcv1')) rcv1t+=s.amt; else rcv2t+=s.amt;
      methMap[s.mth]=(methMap[s.mth]||0)+s.amt;
    }
  });
  var bTotal=document.getElementById('bTotal');
  var bEC=document.getElementById('bEntryCount');
  var bRS=document.getElementById('bRcvSplit');
  var bMB=document.getElementById('bMethBreak');
  if(bTotal) bTotal.textContent=total.toLocaleString('en-IN');
  if(bEC) bEC.textContent=count;
  if(bRS) bRS.textContent=count>0?t('rcv1')+' ৳'+rcv1t.toLocaleString('en-IN')+' · '+t('rcv2')+' ৳'+rcv2t.toLocaleString('en-IN'):'';
  if(bMB){
    bMB.innerHTML='';
    Object.keys(methMap).forEach(function(k){
      var sp=document.createElement('span');
      sp.style.cssText='font-size:10px;background:var(--acc-bg);color:var(--acc-txt);padding:2px 7px;border-radius:999px;white-space:nowrap;';
      sp.textContent=k+' ৳'+methMap[k].toLocaleString('en-IN');
      bMB.appendChild(sp);
    });
  }
}

    '<div style="margin-bottom:8px;"><label class="fl">'+t('typeLabel')+'</label><select>'+t('bankTypes').map(function(b){return '<option>'+b+'</option>';}).join('')+'</select></div>'+

    '<button id="bankSave" style="width:100%;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;">'+t('saveBtn')+'</button>'+
  '</div>'+
  '<div id="pLoan" style="'+(appState.expTab==='loan'?'':'display:none;')+'">'+

    '<div style="margin-bottom:8px;"><label class="fl">'+t('typeLabel')+'</label><select>'+t('loanTypes').map(function(l){return '<option>'+l+'</option>';}).join('')+'</select></div>'+
    '<div style="margin-bottom:8px;"><label class="fl">'+t('amtLabel')+'</label><input type="number" placeholder="1500" style="text-align:right;"></div>'+

function wireExpense(){
  var pExp=document.getElementById('pExpense');
  if(!pExp) return;
  pExp.querySelectorAll('[data-exptab]').forEach(function(b){
    b.addEventListener('click',function(){
      appState.expTab=b.getAttribute('data-exptab');
      pExp.querySelectorAll('[data-exptab]').forEach(function(x){x.classList.toggle('on',x===b);});
      pExp.querySelector('#pExp').style.display=appState.expTab==='exp'?'block':'none';
      pExp.querySelector('#pBank').style.display=appState.expTab==='bank'?'block':'none';
      pExp.querySelector('#pLoan').style.display=appState.expTab==='loan'?'block':'none';
    });
  });
  ['expSave','bankSave','loanSave'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.addEventListener('click',function(){showToast(t('saved'));});
  });
}

/* ═══════════════════════════════════════
   MEMBER SHEET
═══════════════════════════════════════ */
function openSheet(code){
  var m=members.filter(function(x){return x.c===code;})[0];
  if(!m) return;
  var paid=m.jun26>0;
  var due=!paid?'<div style="background:var(--warn-bg);color:var(--warn-txt);font-size:11px;padding:8px 10px;border-radius:9px;margin:8px 0;text-align:center;font-weight:600;">'+t('paymentDue')+'</div>':'';
  var lnBadge=m.loan>0?'<span style="font-size:11px;padding:3px 8px;border-radius:999px;background:var(--warn-bg);color:var(--warn-txt);font-weight:600;">'+t('loanBadge')+': ৳'+m.loan+'</span>':'';
  var phoneClean=m.ph.replace(/[^0-9]/g,'').replace(/^0/,'');
  var waHref='https://wa.me/880'+phoneClean;

  document.getElementById('shBody').innerHTML=
    '<div style="display:flex;justify-content:flex-end;"><button id="cBtn" style="background:var(--bg2);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;font-size:16px;">✕</button></div>'+
    '<div style="text-align:center;margin-bottom:10px;">'+
      '<div class="avatar bn" style="width:54px;height:54px;font-size:17px;font-weight:800;margin:0 auto 8px;">'+ini(m.n)+'</div>'+
      '<p class="bn" style="margin:0;font-size:16px;font-weight:700;color:var(--t1);">'+m.n+'</p>'+
      '<p style="margin:1px 0 0;font-size:11px;color:var(--t4);">'+m.c+' · '+m.j+'</p>'+
      '<div style="display:flex;gap:6px;justify-content:center;margin-top:6px;">'+
        '<span style="font-size:11px;padding:3px 8px;border-radius:999px;background:var(--acc-bg);color:var(--acc-txt);font-weight:500;" class="bn">'+m.role+'</span>'+
        lnBadge+
      '</div>'+
    '</div>'+
    due+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;">'+
      '<a class="iconBtn" href="tel:'+m.ph+'"><i class="ti ti-phone" style="font-size:17px;"></i>'+t('call')+'</a>'+
      '<a class="iconBtn" href="'+waHref+'"><i class="ti ti-brand-whatsapp" style="font-size:17px;"></i>'+t('whatsapp')+'</a>'+
      '<button class="iconBtn"><i class="ti ti-mail" style="font-size:17px;"></i>'+t('email')+'</button>'+
      '<button class="iconBtn"><i class="ti ti-map-pin" style="font-size:17px;"></i>'+t('maps')+'</button>'+
    '</div>'+
    '<div class="card" style="margin-bottom:10px;">'+
      mkDetailRow(t('addrLabel'),m.addr,true)+
      mkDetailRow(t('mobileLabel'),'<span style="color:var(--acc);">'+m.ph+'</span>',false)+
      mkDetailRow(t('joinedLabel'),m.j,true)+
    '</div>'+
    '<div class="card">'+
      '<p style="margin:0;font-size:11px;color:var(--t3);">'+t('totalSavingsLabel')+'</p>'+
      '<p style="margin:2px 0 8px;font-size:23px;font-weight:800;color:var(--t1);">৳'+m.total.toLocaleString('en-IN')+'</p>'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0 0;border-top:1px solid var(--bg2);">'+
        '<span style="color:var(--t3);">'+t('juneLabel')+'</span>'+
        '<span style="font-weight:700;color:'+(paid?'var(--ok-txt)':'var(--warn-txt)')+';">'+(paid?'৳'+m.jun26:'—')+'</span>'+
      '</div>'+
    '</div>'+
    '<button id="histBtn" style="width:100%;margin-top:10px;background:none;border:1px solid var(--bdr);border-radius:9px;padding:10px;font-size:12px;color:var(--acc);font-weight:500;font-family:inherit;cursor:pointer;">'+t('fullHistory')+'</button>';

  document.getElementById('shOv').style.opacity='1';
  document.getElementById('shOv').style.pointerEvents='auto';
  document.getElementById('shDrw').style.transform='translateY(0)';
  document.getElementById('cBtn').onclick=closeSheet;
}

function mkDetailRow(label,val,isLast){
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;'+(isLast?'':'border-bottom:1px solid var(--bg2);')+'font-size:12px;">'+
    '<span style="color:var(--t3);">'+label+'</span>'+
    '<span class="bn" style="color:var(--t1);">'+val+'</span>'+
  '</div>';
}

function closeSheet(){
  document.getElementById('shOv').style.opacity='0';
  document.getElementById('shOv').style.pointerEvents='none';
  document.getElementById('shDrw').style.transform='translateY(100%)';
}

/* ═══════════════════════════════════════

/* Nav */
document.querySelectorAll('.navBtn').forEach(function(b){
  b.addEventListener('click',function(){showScreen(b.getAttribute('data-screen'));});
});

/* Role switcher */
document.querySelectorAll('.roleBtn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.roleBtn').forEach(function(x){x.classList.toggle('on',x===b);});
    appState.role=b.getAttribute('data-role');
    document.getElementById('navEntry').style.display=appState.role==='accountant'?'flex':'none';
    if(appState.role==='associate'&&appState.screen==='entry') showScreen('home');
  });
});

/* Status chips */
document.querySelectorAll('.stChip').forEach(function(c){
  c.addEventListener('click',function(){
    document.querySelectorAll('.stChip').forEach(function(x){x.classList.toggle('on',x===c);});
    renderList();
  });
});

/* Search */
document.getElementById('srch').addEventListener('input',renderList);

/* Drawer overlay */
document.getElementById('shOv').addEventListener('click',closeSheet);

applyTheme(appState.theme);
renderList();

})();
