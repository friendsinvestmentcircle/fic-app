<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIC Members Lookup</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    
    <div class="header-container">
      <h1 class="header-title">MEMBER LOOKUP</h1>
      <p class="header-subtitle">Members Lookup</p>
    </div>

    <div class="search-wrapper">
      <input 
        type="text" 
        id="search-input" 
        placeholder="Search by Name or Associate Code" 
        autofocus 
        class="search-input"
      >
      <button id="clear-search" class="clear-btn" title="Clear search">×</button>
    </div>

    <div id="result-count" class="result-count hidden"></div>

    <div id="loading-spinner" class="status-message hidden">Searching directory...</div>

    <div id="results-container" class="results-list"></div>

  </div>

  <script>
    // CRITICAL configuration link pointing directly to your Google Server API 
    const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbytyy7wzSGraYIsWEjc8ekUi_R6l51DKQqtgTVdn38Vc2-5I7mnSUwzyxxgAtpbite1uw/exec";

    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('search-input');
      const clearBtn = document.getElementById('clear-search');
      const countHeader = document.getElementById('result-count');
      const container = document.getElementById('results-container');
      const loading = document.getElementById('loading-spinner');

      // Requirement 3: Professional Date Formatter (01 Jul 2025)
      function formatDate(dateString) {
        if (!dateString) return "N/A";
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return dateString;
        
        const day = String(date.getDate()).padStart(2, '0');
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        return `${day} ${months[date.getMonth()]} ${date.getFullYear()}`;
      }

      // Requirement 4: On-the-fly Membership Month Computations
      function calculateMembershipMonths(dateString) {
        if (!dateString) return "0 months";
        const joinDate = new Date(dateString);
        if (isNaN(joinDate.getTime())) return "N/A";
        
        const today = new Date();
        const yearsDifference = today.getFullYear() - joinDate.getFullYear();
        const monthsDifference = today.getMonth() - joinDate.getMonth();
        
        const totalMonths = (yearsDifference * 12) + monthsDifference;
        return `${Math.max(0, totalMonths)} months`;
      }

      // Requirement 5: Explicit Clickable Mobile Formatter With Safe Prefix Injection
      function formatMobile(phoneString) {
        let cleanNumber = String(phoneString).replace(/\D/g, '');
        if (!cleanNumber) return "N/A";
        if (!cleanNumber.startsWith('880') && !cleanNumber.startsWith('60') && !cleanNumber.startsWith('1')) {
           return `+${cleanNumber}`;
        }
        return `+${cleanNumber}`;
      }

      // Main UI Paint Loop
      function renderResults(results) {
        if (loading) loading.classList.add('hidden');
        container.innerHTML = '';

        // Requirement 8: Explicit Empty Results Fallback State 
        if (!results || results.length === 0) {
          countHeader.classList.add('hidden');
          container.innerHTML = '<div class="status-message">No member found.</div>';
          return;
        }

        // Requirement 7: Result Count Display Evaluation
        countHeader.textContent = `${results.length} ${results.length === 1 ? 'Member' : 'Members'} Found`;
        countHeader.classList.remove('hidden');

        // Requirement 2: Swapped Visual Hierarchy Pipeline
        container.innerHTML = results.map(member => {
          const displayedPhone = formatMobile(member.mobile);
          return `
            <div class="member-card">
              <h2 class="member-name">${member.name}</h2>
              <div class="member-meta">
                <div class="meta-row"><span class="meta-label">Member Code:</span> <span class="meta-value">${member.code}</span></div>
                <div class="meta-row"><span class="meta-label">Join Date:</span> <span class="meta-value">${formatDate(member.joinDate)}</span></div>
                <div class="meta-row"><span class="meta-label">Membership Months:</span> <span class="meta-value">${calculateMembershipMonths(member.joinDate)}</span></div>
                <div class="meta-row">
                  <span class="meta-label">Mobile:</span> 
                  <span class="meta-value">
                    <a href="tel:${displayedPhone}" class="phone-link" onclick="event.stopPropagation();">${displayedPhone}</a>
                  </span>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      function performSearch(query) {
        const cleanQuery = query.trim();
        
        if (cleanQuery === '') {
          container.innerHTML = '';
          countHeader.classList.add('hidden');
          clearBtn.style.display = 'none';
          if (loading) loading.classList.add('hidden');
          return;
        }

        // Display the cancellation utility option
        clearBtn.style.display = 'flex';
        if (loading) loading.classList.remove('hidden');

        // PWA Engine Execution via Fetch directly routing to Apps Script Cloud Endpoints
        fetch(`${APPS_SCRIPT_WEBAPP_URL}?q=${encodeURIComponent(cleanQuery)}`)
          .then(response => response.json())
          .then(data => renderResults(data))
          .catch(error => {
            console.error("Directory fetching execution error:", error);
            if (loading) loading.classList.add('hidden');
            container.innerHTML = '<div class="status-message" style="color:#ef4444;">Error accessing data directory.</div>';
          });
      }

      // Debounce logic wrapper to prevent resource thrashing
      function debounce(func, delay) {
        let timeoutId;
        return (...args) => {
          clearTimeout(timeoutId);
          timeoutId = setTimeout(() => func(...args), delay);
        };
      }

      // Input Field Events Configuration
      searchInput.addEventListener('input', debounce((e) => {
        performSearch(e.target.value);
      }, 300));

      // Requirement 1: Clear Field Button Actions Setup
      clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        performSearch('');
        searchInput.focus();
      });
    });

    // PWA Service Worker Hook Architecture initialization
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker Registered Successfully.', reg.scope))
          .catch(err => console.error('Service Worker Registry Blocked:', err));
      });
    }
  </script>
</body>
</html>
