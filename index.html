<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIC Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-12">

    <header class="bg-blue-600 text-white sticky top-0 z-50 shadow-md px-4 py-4">
        <h1 class="text-xl font-bold tracking-wide">FIC Staff Portal</h1>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-2">Member Lookup</h2>
            <div class="relative">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Enter Name or ID..." 
                    class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 pl-11 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                />
                <svg class="absolute left-3 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </section>

        <div id="loading" class="hidden flex justify-center py-6">
            <div class="animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
        </div>

        <div id="display-container" class="space-y-4"></div>

    </main>

    <script>
        // ⚠️ REPLACE WITH YOUR ACTUAL GOOGLE APPS SCRIPT URL ⚠️
        const API_URL = "https://script.google.com/macros/s/AKfycbzjTEnpKymNuTAk96JXouXDIEl91aL7xd5SmEBGl81-HmwCrdV-n3K9ZQ3dWDQJXHkg/exec"; 

        const searchInput = document.getElementById('search-input');
        const loading = document.getElementById('loading');
        const container = document.getElementById('display-container');

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 2) { container.innerHTML = ''; return; }

            loading.classList.remove('hidden');
            try {
                const response = await fetch(`${API_URL}?action=search&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                renderResults(data.results);
            } catch (err) {
                container.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-xl text-sm">Error: Unable to connect to server.</div>`;
            } finally {
                loading.classList.add('hidden');
            }
        });

        function renderResults(results) {
            container.innerHTML = '';
            if (!results || results.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">No members found.</div>`;
                return;
            }

            results.forEach(member => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-gray-100 fade-in";
                card.innerHTML = `
                    <div class="text-xs font-bold text-blue-600 uppercase tracking-wider">${member.Code}</div>
                    <h3 class="text-xl font-bold text-gray-900 mt-1">${member.Name}</h3>
                    <div class="mt-4 grid grid-cols-2 gap-y-3 text-sm">
                        <div><span class="block text-gray-400 uppercase text-[10px]">Location</span>${member.Location}</div>
                        <div><span class="block text-gray-400 uppercase text-[10px]">Mobile</span><a href="tel:${member.Phone}" class="text-blue-600">${member.Phone}</a></div>
                        <div><span class="block text-gray-400 uppercase text-[10px]">Join Date</span>${member.joinDate}</div>
                        <div><span class="block text-gray-400 uppercase text-[10px]">Membership</span>${member.membershipMonth} ${member.membershipYear}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
    </script>
</body>
</html>
