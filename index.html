<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIC Members Lookup</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Search Header -->
    <div class="header-container">
      <h1 class="header-title">MEMBERS LOOKUP</h1>
    </div>

    <!-- Search Input Box -->
    <div class="search-wrapper">
      <input 
        type="text" 
        id="search-input" 
        placeholder="Search by Name, Code or Number" 
        autofocus 
        class="search-input"
      >
      <button id="clear-search" class="clear-btn" title="Clear search">×</button>
    </div>

    <!-- Result Count Header -->
    <div id="result-count" class="result-count hidden"></div>

    <!-- Loading State View -->
    <div id="loading-spinner" class="status-message hidden">Searching directory...</div>

    <!-- Search Results Target Container -->
    <div id="results-container" class="results-list"></div>

  </div>

  <script>
    // PASTE YOUR FRESHLY COPIED GOOGLE APPS SCRIPT WEB APP URL HERE:
    const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbytyy7wzSGraYIsWEjc8ekUi_R6l51DKQqtgTVdn38Vc2-5I7mnSUwzyxxgAtpbite1uw/exec";

    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('search-input');
      const clearBtn = document.getElementById('clear-search');
      const countHeader = document.getElementById('result-count');
      const container = document.getElementById('results-container');
      const loading = document.getElementById('loading-spinner');

      // Formats Date strings professionally (e.g., 01 Jul 2025)
      function formatDate(dateString) {
        if (!dateString) return "N/A";
        const date = new Date(dateString);
        if (isNaN(date.getTime())) return dateString; 
        
        const day = String(date.getDate()).padStart(2, '0');
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        return `${day} ${months[date.getMonth()]} ${date.getFullYear()}`;
      }

      // Calculates inclusive tracking timeline lengths
      function getMembershipMonthsCount(dateString) {
        if (!dateString) return 0;
        const joinDate = new Date(dateString);
        if (isNaN(joinDate.getTime())) return 0;
        
        const today = new Date();
        const yearsDifference = today.getFullYear() - joinDate.getFullYear();
        const monthsDifference = today.getMonth() - joinDate.getMonth();
        
        const totalMonths = (yearsDifference * 12) + monthsDifference + 1;
        return Math.max(0, totalMonths);
      }

      // Formats display numbers cleanly 
      function formatDisplayPhone(phoneString) {
        let digits = String(phoneString).replace(/\D/g, '');
        // If it already has country prefixes like 880 or 60, don't double append them
        if (digits.startsWith('880') || digits.startsWith('60')) {
          return `+${digits}`;
        }
        // If it's a local number without a prefix, preserve it cleanly
        if (digits.startsWith('0')) {
          return digits;
        }
        return `+${digits}`;
      }

      function renderResults(results) {
        if (loading) loading.classList.add('hidden');
        container.innerHTML = '';

        if (!results || results.length === 0) {
          countHeader.classList.add('hidden');
          container.innerHTML = '<div class="status-message">No member found.</div>';
          return;
        }

        countHeader.textContent = `${results.length} ${results.length === 1 ? 'Member' : 'Members'} Found`;
        countHeader.classList.remove('hidden');

        container.innerHTML = results.map(member => {
          const printablePhone = formatDisplayPhone(member.mobile);
          // For system dialers, make sure it has the leading '+' prefix
          const dialerPhone = printablePhone.startsWith('+') ? printablePhone : `+88${printablePhone}`;

          const monthsCount = getMembershipMonthsCount(member.joinDate);
          const savingsAmount = monthsCount * 300;
          const formattedSavings = `৳ ${savingsAmount.toLocaleString('en-US')}`;

          return `
            <div class="member-card">
              <div class="names-block">
                <h2 class="member-name-en">${member.name}</h2>
                ${member.nameBn ? `<h3 class="member-name-bn">${member.nameBn}</h3>` : ''}
              </div>
              <div class="member-meta">
                <div class="meta-row">
                  <span class="meta-label">Member Code</span> 
                  <span class="meta-value">${member.code}</span>
                </div>
                <div class="meta-row">
                  <span class="meta-label">Location</span> 
                  <span class="meta-value">${member.location || 'N/A'}</span>
                </div>
                <div class="meta-row">
                  <span class="meta-label">Join Date</span> 
                  <span class="meta-value">${formatDate(member.joinDate)}</span>
                </div>
                <div class="meta-row">
                  <span class="meta-label">Mobile</span> 
                  <span class="meta-value">
                    <a href="tel:${dialerPhone}" class="phone-link" onclick="event.stopPropagation();">${printablePhone}</a>
                  </span>
                </div>
                <div class="meta-row">
                  <span class="meta-label">Total Savings</span> 
                  <span class="meta-value-savings">${formattedSavings}</span>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      function performSearch(query) {
        const cleanQuery = query.trim();
        
        if (cleanQuery === '') {
          clearBtn.style.display = 'none';
        } else {
          clearBtn.style.display = 'flex';
        }

        if (loading) loading.classList.remove('hidden');

        fetch(`${APPS_SCRIPT_WEBAPP_URL}?q=${encodeURIComponent(cleanQuery)}`)
          .then(response => response.json())
          .then(data => renderResults(data))
          .catch(error => {
            console.error("Inbound directory query failure:", error);
            if (loading) loading.classList.add('hidden');
            container.innerHTML = '<div class="status-message" style="color:#ef4444;">Error accessing data directory.</div>';
          });
      }

      function debounce(func, delay) {
        let timeoutId;
        return (...args) => {
          clearTimeout(timeoutId);
          timeoutId = setTimeout(() => func(...args), delay);
        };
      }

      searchInput.addEventListener('input', debounce((e) => {
        performSearch(e.target.value);
      }, 300));

      clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        performSearch('');
        searchInput.focus();
      });

      // Automated initialization call
      performSearch('');
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker Registered.', reg.scope))
          .catch(err => console.error('Service Worker Registration Failed:', err));
      });
    }
  </script>
</body>
</html>
