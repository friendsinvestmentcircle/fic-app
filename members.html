<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIC Staff Portal – Members</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Anek+Bangla:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div id="shOv"></div>
  <div id="shDrw">
    <div class="drawerHandle"></div>
    <div id="shBody"></div>
  </div>
  <div id="ficToast"></div>

  <header class="appHeader">
    <div class="hTop">
      <div>
        <p class="hTitle" id="appTitle">FIC Staff Portal</p>
        <p class="hSub" id="appSub">48 Members · June 2026</p>
      </div>
      <div class="rolePill">
        <button class="roleBtn on" data-role="associate">Associate</button>
        <button class="roleBtn" data-role="accountant">Accountant</button>
      </div>
    </div>
  </header>

  <main id="appContent">
    <div id="scHome">
      <div class="searchWrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="srch" type="text" placeholder="Name / Code / Phone..." aria-label="Search" />
      </div>
      <div class="filterChips">
        <button class="chip on stChip" data-s="all">All</button>
        <button class="chip stChip" data-s="paid">Paid</button>
        <button class="chip stChip" data-s="due">Due</button>
      </div>
      <p id="rCnt" class="resultCount"></p>
      <div id="mList"></div>
    </div>
  </main>

  <nav id="bottomNav">
    <a href="members.html" class="navBtn on" data-screen="home">
      <i class="fa-solid fa-users"></i>
      <span>Members</span>
    </a>
    <a href="index.html" class="navBtn" data-screen="dash">
      <i class="fa-solid fa-chart-bar"></i>
      <span>Summary</span>
    </a>
    <a href="entry.html" class="navBtn" id="navEntry" data-screen="entry" style="display:none;">
      <i class="fa-solid fa-circle-plus"></i>
      <span>Entry</span>
    </a>
    <a href="settings.html" class="navBtn" data-screen="settings">
      <i class="fa-solid fa-gear fa-spin" style="--fa-animation-duration: 4s;"></i>
      <span>Settings</span>
    </a>
  </nav>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      initPage('home');
    });
  </script>
</body>
</html>
